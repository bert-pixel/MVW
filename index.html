<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuickScan</title>
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <nav class="nav topnav">
      <div class="container">
        <div id="logo">
          <img src="assets/mvw-logo.svg" alt="Logo" />
        </div>
      </div>
    </nav>

    <main class="main">
      <section class="section">
        <div class="container">
          <article class="article">
            <header>
              <h1>Quick Scan</h1>
            </header>
          </article>

          <template id="progress-template">
            <div class="progress-bar">
              <div class="progress-steps"></div>
            </div>
          </template>

          <template id="question-template">
            <section class="question-card">
              <div class="question-header">
                <h2 class="question-title"></h2>
              </div>
              <div class="question-options"></div>
            </section>
          </template>

          <template id="outcome-template">
            <section class="outcome-card">
              <h2 class="outcome-title"></h2>
              <p class="outcome-body"></p>
              <div class="outcome-ctas"></div>
            </section>
          </template>

          <template id="cta-template">
            <button type="button" class="cta-button"></button>
          </template>

          <div id="app">
            <!-- QuickScan content will be rendered here -->
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="./app.mjs"></script>
  </body>
</html>
